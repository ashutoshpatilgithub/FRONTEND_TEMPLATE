services:
  - type: web
    name: bookworm-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node Backend.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_EXPIRE
        value: 3d
      - key: COOKIE_EXPIRE
        value: 3
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_SERVICE
        value: gmail
      - key: SMTP_PORT
        value: 465
      - key: SMTP_MAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CLOUDINARY_CLIENT_NAME
        sync: false
      - key: CLOUDINARY_CLIENT_API
        sync: false
      - key: CLOUDINARY_CLIENT_SECRET
        sync: false
